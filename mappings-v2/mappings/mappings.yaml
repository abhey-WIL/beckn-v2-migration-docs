                }
              }]
            }
          }
        }
      )

    bppMappings: |
      (
        $ctx      := $.context;
        $contract := $.message.contract;

        {
          "context": {
            "version": "1.0.0",
            "action": $ctx.action,
            "domain": $ctx.networkId,
            "bap_id": $ctx.bapId,
            "bap_uri": $ctx.bapUri,
            "bpp_id": $ctx.bppId,
            "bpp_uri": $ctx.bppUri,
            "transaction_id": $ctx.transactionId,
